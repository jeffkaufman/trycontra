<!DOCTYPE HTML>
<html>
<head>
<title>Heatmap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
html, body, #map {
  height: 100%;
  margin: 0px;
  padding: 0px;
}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
var map = L.map('map').setView([39.81, -98.56], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

window.fetch("dances_locs.json")
  .then(r => r.json())
  .then(dances => {
    var heatMapData = [];
    for (var i = 0; i < dances.length; i++) {
      var weight = dances[i].annual_freq;
      var lat = dances[i].lat;
      var lng = dances[i].lng;
      var active = !dances[i].inactive;
      if (!lat || !lng || !active) continue;
      heatMapData.push([lat, lng, weight]);
    }
    L.heatLayer(heatMapData, {
      radius: 40,
      blur: 20,
      minOpacity: 0.5,
      gradient: {0.2: 'blue', 0.5: 'lime', 0.8: 'yellow', 1.0: 'red'}
    }).addTo(map);
  });
</script>
</body>
</html>
